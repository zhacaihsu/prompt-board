<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Prompt Board</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --dark: #111827;
      --danger: #b91c1c;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, .94);
      backdrop-filter: blur(12px);
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      outline: none;
      background: #fff;
    }

    #searchInput {
      flex: 1;
      border-radius: 999px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      background: var(--dark);
      color: #fff;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      touch-action: manipulation;
    }

    button.secondary {
      background: #e5e7eb;
      color: var(--dark);
    }

    button.danger {
      background: var(--danger);
      color: #fff;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 10px;
      padding-bottom: 96px;
    }

    .list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, .06);
    }

    .content {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 15px;
      line-height: 1.45;
      max-height: 168px;
      overflow: auto;
      cursor: pointer;
      user-select: text;
      -webkit-tap-highlight-color: rgba(17, 24, 39, .08);
    }

    .content:active {
      background: #f3f4f6;
      border-radius: 10px;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }

    .actions button {
      width: 25%;
      min-width: 72px;
      min-height: 44px;
      padding: 9px 8px;
      font-size: 13px;
      line-height: 1.2;
    }

    dialog {
      width: min(720px, calc(100vw - 24px));
      border: 0;
      border-radius: 18px;
      padding: 0;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .22);
    }

    dialog::backdrop {
      background: rgba(17, 24, 39, .38);
    }

    .modal {
      padding: 14px;
      background: #fff;
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 14px;
      font-weight: 700;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .row input {
      width: auto;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    #toast {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      opacity: 0;
      transform: translateY(12px);
      transition: .16s ease;
      background: var(--dark);
      color: white;
      border-radius: 14px;
      padding: 11px 12px;
      font-weight: 700;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .empty {
      padding: 16px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: #fff;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 8px;
    }
  </style>
</head>
<body>
  <header>
    <input id="searchInput" type="search" placeholder="搜尋">
    <button id="addBtn">新增</button>
    <button id="importBtn" class="secondary">匯入</button>
    <button id="exportBtn" class="secondary">匯出</button>
  </header>

  <main>
    <div id="list" class="list"></div>
  </main>

  <div id="toast"></div>

  <dialog id="editorDialog">
    <form id="editorForm" class="modal" method="dialog">
      <h2 id="editorHeading">新增</h2>
      <input id="editIndex" type="hidden">

      <label for="contentInput">content</label>
      <textarea id="contentInput" required></textarea>

      <label for="titleInput">title（只做管理，不顯示）</label>
      <input id="titleInput" type="text">

      <label for="descriptionInput">description（只做管理，不顯示）</label>
      <input id="descriptionInput" type="text">

      <div class="row">
        <input id="pinnedInput" type="checkbox">
        <label for="pinnedInput" style="margin:0;">pinned</label>
      </div>

      <div class="modal-actions">
        <button id="deleteBtn" type="button" class="danger">刪除</button>
        <button id="cancelEditBtn" type="button" class="secondary">取消</button>
        <button type="submit">儲存</button>
      </div>
    </form>
  </dialog>

  <dialog id="importDialog">
    <form id="importForm" class="modal" method="dialog">
      <h2>匯入 JSON</h2>
      <textarea id="importText"></textarea>
      <div class="modal-actions">
        <button id="cancelImportBtn" type="button" class="secondary">取消</button>
        <button type="submit">匯入</button>
      </div>
    </form>
  </dialog>

  <dialog id="exportDialog">
    <form class="modal" method="dialog">
      <h2>匯出 JSON</h2>
      <textarea id="exportText" readonly></textarea>
      <div class="modal-actions">
        <button id="copyExportBtn" type="button">複製 JSON</button>
        <button id="closeExportBtn" type="button" class="secondary">關閉</button>
      </div>
    </form>
  </dialog>

  <dialog id="fallbackDialog">
    <form class="modal" method="dialog">
      <h2>手動複製</h2>
      <p class="hint">自動複製被瀏覽器阻擋時，改用此文字框複製。</p>
      <textarea id="fallbackText" readonly></textarea>
      <div class="modal-actions">
        <button id="selectFallbackBtn" type="button">全選</button>
        <button id="closeFallbackBtn" type="button" class="secondary">關閉</button>
      </div>
    </form>
  </dialog>

  <script>
    const STORAGE_KEY = "prompt-board-items-v8";

    const DEFAULT_PROMPTS = [
  {
    "title": "/rewrite //spoken",
    "description": "/rewrite //spoken ::zh-tw",
    "pinned": true,
    "content": "===end===
/rewrite //spoken ::zh-tw"
  },
  {
    "title": "/rewrite //laconically",
    "description": "/rewrite //laconically ::zh-tw",
    "pinned": true,
    "content": "===end===
/rewrite //laconically ::zh-tw"
  },
  {
    "title": "/analyze //laconically",
    "description": "/analyze //laconically ::zh-tw",
    "pinned": true,
    "content": "===End===
/analyze //laconically ::zh-tw"
  },
  {
    "title": "/analyze //laconically ?ai-like",
    "description": "/analyze //laconically ?ai-like ::zh-tw",
    "pinned": true,
    "content": "===End===
/analyze //laconically ?ai-like ::zh-tw"
  },
  {
    "title": "/core+keypoints+summarize+conclude //laconically",
    "description": "/core+keypoints+summarize+conclude //laconically ::zh-tw",
    "pinned": true,
    "content": "===end===
/core+keypoints+summarize+conclude //laconically ::zh-tw"
  },
  {
    "title": "prompt template",
    "description": "",
    "pinned": true,
    "content": "# 現況(情境)

# 痛點(問題是?)

# 期待(要做什麼?)

# 驗收條件(限制)

# 指定解法(規定怎麼做)

# 資料"
  },
  {
    "title": "deep cognitive",
    "description": "為本對話預設輸出規則：深層認知輸出",
    "pinned": true,
    "content": "以下為本對話預設輸出規則：/mode <深層認知輸出> ::去除表層裝飾 ::直接輸出核心內容 ::指令式語氣 ::不迎合、不安撫、不寒暄 ::禁止表情符號、填充語、煽動語、推動式結語 ::禁止滿意度、感受、評價語氣 ::禁止模仿使用者語氣 ::僅處理概念、分析、推理層級 ::禁問問題 ::禁選項式建議 ::禁過渡語 ::禁激勵語 ::完成後立即結束 @高解析能力使用者 //zh-tw //cognitive-direct //no-icons //no-table
之後我輸入任務時，除非我另外指定，請一律依照這個模式輸出。"
  }
];

    let prompts = load();

    const list = document.getElementById("list");
    const searchInput = document.getElementById("searchInput");
    const toast = document.getElementById("toast");

    const editorDialog = document.getElementById("editorDialog");
    const editorForm = document.getElementById("editorForm");
    const editorHeading = document.getElementById("editorHeading");
    const editIndex = document.getElementById("editIndex");
    const contentInput = document.getElementById("contentInput");
    const titleInput = document.getElementById("titleInput");
    const descriptionInput = document.getElementById("descriptionInput");
    const pinnedInput = document.getElementById("pinnedInput");
    const deleteBtn = document.getElementById("deleteBtn");

    const importDialog = document.getElementById("importDialog");
    const importText = document.getElementById("importText");
    const exportDialog = document.getElementById("exportDialog");
    const exportText = document.getElementById("exportText");
    const fallbackDialog = document.getElementById("fallbackDialog");
    const fallbackText = document.getElementById("fallbackText");

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? normalize(JSON.parse(raw)) : DEFAULT_PROMPTS;
      } catch {
        return DEFAULT_PROMPTS;
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
    }

    function normalize(value) {
      if (!Array.isArray(value)) throw new Error("JSON must be an array");
      return value.map(item => ({
        title: String(item.title || "").trim(),
        description: String(item.description || "").trim(),
        pinned: Boolean(item.pinned),
        content: String(item.content || "")
      })).filter(item => item.content.trim());
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1100);
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          showToast("已複製");
          return;
        }
        throw new Error("Clipboard API blocked");
      } catch {
        fallbackText.value = text;
        fallbackDialog.showModal();
        setTimeout(() => {
          fallbackText.focus();
          fallbackText.select();
        }, 50);
      }
    }

    function render() {
      const keyword = searchInput.value.trim().toLowerCase();

      const items = prompts
        .map((item, index) => ({ ...item, index }))
        .filter(item => {
          if (!keyword) return true;
          return [item.content, item.title, item.description].join("\n").toLowerCase().includes(keyword);
        })
        .sort((a, b) => Number(b.pinned) - Number(a.pinned));

      list.innerHTML = items.length
        ? items.map(renderCard).join("")
        : '<div class="empty">沒有資料</div>';

      bindCards();
    }

    function renderCard(item) {
      return `
        <article class="card" data-index="${item.index}">
          <pre class="content">${escapeHTML(item.content)}</pre>
          <div class="actions">
            <button class="editBtn secondary" type="button">編輯</button>
            <button class="pinBtn secondary" type="button">${item.pinned ? "取消釘選" : "釘選"}</button>
          </div>
        </article>
      `;
    }

    function bindCards() {
      document.querySelectorAll(".card").forEach(card => {
        const index = Number(card.dataset.index);

        card.querySelector(".content").addEventListener("click", () => {
          copyText(prompts[index].content);
        });

        card.querySelector(".editBtn").addEventListener("click", () => {
          openEditor(index);
        });

        card.querySelector(".pinBtn").addEventListener("click", () => {
          prompts[index].pinned = !prompts[index].pinned;
          save();
          render();
        });
      });
    }

    function openEditor(index = "") {
      const editing = index !== "";
      editorHeading.textContent = editing ? "編輯" : "新增";
      editIndex.value = editing ? String(index) : "";
      deleteBtn.style.display = editing ? "inline-block" : "none";

      const item = editing ? prompts[index] : {
        title: "",
        description: "",
        pinned: true,
        content: ""
      };

      contentInput.value = item.content;
      titleInput.value = item.title;
      descriptionInput.value = item.description;
      pinnedInput.checked = item.pinned;

      editorDialog.showModal();
      setTimeout(() => contentInput.focus(), 50);
    }

    editorForm.addEventListener("submit", event => {
      event.preventDefault();

      const item = {
        title: titleInput.value.trim(),
        description: descriptionInput.value.trim(),
        pinned: pinnedInput.checked,
        content: contentInput.value
      };

      if (!item.content.trim()) {
        showToast("content 不可空白");
        return;
      }

      const index = editIndex.value;
      if (index === "") {
        prompts.unshift(item);
      } else {
        prompts[Number(index)] = item;
      }

      save();
      editorDialog.close();
      render();
      showToast("已儲存");
    });

    deleteBtn.addEventListener("click", () => {
      const index = editIndex.value;
      if (index !== "") {
        prompts.splice(Number(index), 1);
        save();
        editorDialog.close();
        render();
        showToast("已刪除");
      }
    });

    document.getElementById("addBtn").addEventListener("click", () => openEditor());
    document.getElementById("cancelEditBtn").addEventListener("click", () => editorDialog.close());

    document.getElementById("importBtn").addEventListener("click", () => {
      importText.value = "";
      importDialog.showModal();
      setTimeout(() => importText.focus(), 50);
    });

    document.getElementById("cancelImportBtn").addEventListener("click", () => importDialog.close());

    document.getElementById("importForm").addEventListener("submit", event => {
      event.preventDefault();

      try {
        prompts = normalize(JSON.parse(importText.value));
        save();
        importDialog.close();
        render();
        showToast("已匯入");
      } catch {
        showToast("JSON 錯誤");
      }
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      exportText.value = JSON.stringify(prompts, null, 2);
      exportDialog.showModal();
      setTimeout(() => {
        exportText.focus();
        exportText.select();
      }, 50);
    });

    document.getElementById("copyExportBtn").addEventListener("click", () => {
      copyText(exportText.value);
    });

    document.getElementById("closeExportBtn").addEventListener("click", () => exportDialog.close());

    document.getElementById("selectFallbackBtn").addEventListener("click", () => {
      fallbackText.focus();
      fallbackText.select();
    });

    document.getElementById("closeFallbackBtn").addEventListener("click", () => fallbackDialog.close());

    searchInput.addEventListener("input", render);

    render();
  </script>
</body>
</html>
